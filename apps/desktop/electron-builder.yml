appId: com.rotavans.desktop
productName: RotaVans
copyright: Copyright 2026 RotaVans
artifactName: RotaVans-Setup-${version}.${ext}
asar: true

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - electron/**/*.js
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: RotaVans

nsis:
  installerLanguages:
    - pt_BR
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: RotaVans
  deleteAppDataOnUninstall: false
